<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <title>FishNet</title>
</head>
<body>
    <div class="container-fluid main">

        <div class="row header">
            <div class="col-6">Logo</div>
            <div class="col-6 nav">Navigation</div>
        </div>

        <div class="row booking">

            <div class="col-12 productCard">
                <div class="row">
                    <div class="col-12"><p class="mostBooked">⭐ Most Booked</p></div>
                </div>
                <div class="row">
                    <div class="col-6">
                        <h2>Creative Quick Weave</h2>
                    </div>
                    <div class="col-6">
                        <p class="price">$140/Session</p>
                    </div>
                </div>
                <p class="timeSpan">2 Hours - Send Style Inspo After Booking</p>
                <div class="row">
                    <div class="col-12">
                        <p>A bold customized quick weave tailored to your vision. Send your desired style reference directly after booking and we'll bring it to life.</p>
                    </div>
                </div>
                <div class="row">
                    <div class="col-12">
                        <button class="bookNow" id="bookNow">Book Now</button>
                    </div>
                </div>
            </div>

        
        </div>


    </div>
</body>
</html>
